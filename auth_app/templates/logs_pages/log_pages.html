<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Logs</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', 'Consolas', monospace;
            background-color: #000000;
            color: #ffffff;
            padding: 0;
            min-height: 100vh;
            overflow: hidden;
        }

        .terminal-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #000000;
            border: 2px solid #00ff00;
        }

        .terminal-header {
            background-color: #1a1a1a;
            border-bottom: 1px solid #00ff00;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #00ff00;
        }

        .header-title {
            font-weight: bold;
            color: #00ff00;
        }

        .header-controls {
            display: flex;
            gap: 10px;
        }

        .terminal-body {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background-color: #000000;
            font-size: 13px;
            line-height: 1.4;
        }

        .terminal-body::-webkit-scrollbar {
            width: 10px;
        }

        .terminal-body::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        .terminal-body::-webkit-scrollbar-thumb {
            background: #00ff00;
            border-radius: 5px;
        }

        .terminal-body::-webkit-scrollbar-thumb:hover {
            background: #00cc00;
        }

        .log-line {
            margin: 0;
            padding: 0;
            word-break: break-all;
            white-space: pre-wrap;
            font-family: 'Courier New', 'Consolas', monospace;
        }

        .log-line.debug {
            color: #0088ff;
        }

        .log-line.info {
            color: #ffffff;
        }

        .log-line.warning {
            color: #ffaa00;
        }

        .log-line.error {
            color: #ff0000;
        }

        .log-line.critical {
            color: #ff0099;
        }

        .terminal-footer {
            background-color: #1a1a1a;
            border-top: 1px solid #00ff00;
            padding: 8px 15px;
            color: #00ff00;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .control-button {
            padding: 4px 10px;
            margin: 0 3px;
            background-color: #00ff00;
            color: #000000;
            border: none;
            border-radius: 2px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .control-button:hover {
            background-color: #00cc00;
            transform: scale(1.05);
        }

        .control-button:active {
            background-color: #009900;
            transform: scale(0.95);
        }

        .search-input {
            padding: 5px 8px;
            margin: 0 5px;
            background-color: #1a1a1a;
            border: 1px solid #00ff00;
            border-radius: 2px;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            width: 200px;
        }

        .search-input::placeholder {
            color: #008800;
        }

        .search-input:focus {
            outline: none;
            background-color: #0a0a0a;
            border-color: #00ff00;
            box-shadow: 0 0 5px #00ff00;
        }

        .no-logs {
            color: #ffaa00;
            text-align: center;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="terminal-container">
        <div class="terminal-header">
            <span class="header-title">Terminal Logs</span>
            <div class="header-controls">
                <input type="text" id="searchInput" class="search-input" placeholder="search...">
                <button class="control-button" onclick="refreshLogs()">REFRESH</button>
                <button class="control-button" onclick="clearLogs()">CLEAR</button>
            </div>
        </div>

        <div class="terminal-body" id="logsContainer">
            <div class="no-logs">$ Loading logs...</div>
        </div>

        <div class="terminal-footer">
            <span>Entries: <span id="totalEntries">0</span> | Last: <span id="lastUpdate">--:--:--</span></span>
            <span>INFO: <span id="info-count" style="color: #0088ff;">0</span> | WARNING: <span id="warning-count" style="color: #ffaa00;">0</span> | ERROR: <span id="error-count" style="color: #ff0000;">0</span></span>
        </div>
    </div>

    <script>
        let allLogs = [];
        let filteredLogs = [];
        const logsContainer = document.getElementById('logsContainer');
        const searchInput = document.getElementById('searchInput');

        document.addEventListener('DOMContentLoaded', function() {
            loadLogs();
        });

        async function loadLogs() {
            try {
                const response = await fetch('/api/logs/');
                if (!response.ok) throw new Error('Failed to fetch logs');
                
                const data = await response.json();
                allLogs = data.logs || [];
                
                const now = new Date();
                document.getElementById('lastUpdate').textContent = 
                    now.toLocaleTimeString();
                
                updateLogStats();
                filterLogs();
                
            } catch (error) {
                console.error('Error loading logs:', error);
                logsContainer.innerHTML = `<div class="no-logs">$ Error loading logs: ${error.message}</div>`;
            }
        }

        function updateLogStats() {
            const stats = {
                'DEBUG': 0,
                'INFO': 0,
                'WARNING': 0,
                'ERROR': 0,
                'CRITICAL': 0
            };

            allLogs.forEach(log => {
                const level = log.level || 'INFO';
                if (level in stats) {
                    stats[level]++;
                }
            });

            document.getElementById('info-count').textContent = stats['INFO'];
            document.getElementById('warning-count').textContent = stats['WARNING'];
            document.getElementById('error-count').textContent = stats['ERROR'];
            document.getElementById('totalEntries').textContent = allLogs.length;
        }

        function filterLogs() {
            const searchTerm = searchInput.value.toLowerCase().trim();
            
            if (searchTerm === '') {
                filteredLogs = allLogs;
            } else {
                filteredLogs = allLogs.filter(log => 
                    (log.message && log.message.toLowerCase().includes(searchTerm)) ||
                    (log.level && log.level.toLowerCase().includes(searchTerm)) ||
                    (log.timestamp && log.timestamp.toLowerCase().includes(searchTerm))
                );
            }

            displayLogs();
        }

        function displayLogs() {
            if (filteredLogs.length === 0) {
                logsContainer.innerHTML = '<div class="no-logs">$ No logs found</div>';
                return;
            }

            logsContainer.innerHTML = filteredLogs.map(log => {
                const levelClass = (log.level || 'INFO').toLowerCase();
                return `<div class="log-line ${levelClass}">[${log.timestamp}] ${log.level}: ${escapeHtml(log.message)}${log.exception ? '\n' + escapeHtml(log.exception) : ''}</div>`;
            }).join('');

            logsContainer.scrollTop = logsContainer.scrollHeight;
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function clearLogs() {
            if (confirm('Clear all logs?')) {
                allLogs = [];
                filteredLogs = [];
                displayLogs();
                updateLogStats();
            }
        }

        function refreshLogs() {
            loadLogs();
        }

        searchInput.addEventListener('input', filterLogs);
    </script>
</body>
</html>
